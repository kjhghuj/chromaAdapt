# ================================================
# Docker Compose - ChromaAdapt AI 全量部署
# ================================================
# 使用: docker-compose up -d
# 自动构建并启动所有服务

services:
  # -----------------------------------------
  # 前端 - Nginx 静态服务
  # -----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  # -----------------------------------------
  # 后端 - Django API 服务
  # -----------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - ARK_API_KEY=${ARK_API_KEY}
      - ARK_ENDPOINT_ID=${ARK_ENDPOINT_ID}
      - ARK_ENDPOINT_ID_SEEDREAM_5_LITE=${ARK_ENDPOINT_ID_SEEDREAM_5_LITE}
      - ARK_ANALYSIS_ENDPOINT_ID=${ARK_ANALYSIS_ENDPOINT_ID}
      - ARK_ANALYSIS_ENDPOINT_ID_SEED_2_MINI=${ARK_ANALYSIS_ENDPOINT_ID_SEED_2_MINI}
      - ARK_ANALYSIS_ENDPOINT_ID_SEED_2_PRO=${ARK_ANALYSIS_ENDPOINT_ID_SEED_2_PRO}
    networks:
      - app-network
    restart: unless-stopped

  # -----------------------------------------
  # Webhook 监听服务 - 接收 Git Webhook 触发自动部署
  # -----------------------------------------
  webhook:
    build:
      context: .
      dockerfile: backend/Dockerfile.webhook
    ports:
      - "9000:9000"
    volumes:
      - ./:/opt/chromaadapt-ai
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PROJECT_DIR=/opt/chromaadapt-ai
      - DEPLOY_SCRIPT=/opt/chromaadapt-ai/backend/deploy_docker.sh
    networks:
      - app-network
    restart: unless-stopped
    privileged: true

networks:
  app-network:
    driver: bridge
